<!DOCTYPE html>
<html lang="en">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.pumpkin.min.css">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <meta name="description"
        content="Get free Bitcoin! Fast and easy. Click the button to claim your free BTC now! Don't miss out on this limited-time offer.">
    <meta name="keywords" content="free bitcoin, free btc, free crypto, bitcoin, crypto, crypto wallet">
    <meta property="og:title" content="Free BTC - Claim Your Free Bitcoin Now!">
    <meta property="og:description"
        content="Get free Bitcoin! Fast and easy. Click the button to claim your free BTC now! Don't miss out on this limited-time offer.">
    <meta property="og:image" content="https://www.freebtc.one/assets/favicon.ico">
    <meta property="og:url" content="https://www.freebtc.one">
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
    <title>Free BTC</title>

    <script src="https://www.google.com/recaptcha/api.js" async defer></script>

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-NBYXETEMX1"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());
        gtag('config', 'G-NBYXETEMX1');
    </script>
</head>

<body>

    <button id="myButton" onclick="showCaptcha()">
        <strong style="color: #f0f1f3;">FREE BTC</strong>
    </button>

    <div id="captchaBox" style="display:none; margin-top: 1rem;">
        <div class="g-recaptcha" data-sitekey="6Lca8LksAAAAAI6L6TUiCAJrzqNXrOsX42Y9BraH" data-callback="onCaptchaSuccess">
        </div>
    </div>

    <h1 id="topMessage" style="display: none; font-size: 1.25rem; margin: 1rem 0;">
        Imagine being rick rolled in 2026
    </h1>

    <div id="myArticle" style="display: none; position: relative;">
        <article id="mainArticle" aria-busy="true">&#8203;</article>

        <p id="statusMessage" style="margin-top: 1rem; font-weight: bold;"></p>

        <div id="videoContainer" style="display: none; width: 100%;">
            <video id="rickrollVideo" style="width: 100%;" controls>
                <source src="assets/rickroll.mp4" type="video/mp4" />
            </video>
        </div>
    </div>

    <script>
        let statusInterval = null;

        function showCaptcha() {
            document.getElementById("myButton").style.display = "none";
            document.getElementById("captchaBox").style.display = "block";
        }

        function onCaptchaSuccess() {
            document.getElementById("captchaBox").style.display = "none";
            showArticle();
        }

        function showArticle() {

            const messages = [
                "Please wait...",
                "Asking Satoshi for help",
                "Hashing the hash",
                "Validating the blockchain",
                "Bribing the bitcoin miners"
            ];

            document.getElementById("myArticle").style.display = "block";

            const statusEl = document.getElementById("statusMessage");
            let idx = 0;

            function updateStatus() {
                statusEl.textContent = messages[idx];
                idx = (idx + 1) % messages.length;
            }

            updateStatus();

            if (statusInterval) clearInterval(statusInterval);
            statusInterval = setInterval(updateStatus, 30000);

            setTimeout(() => {
                document.getElementById("mainArticle").style.display = "none";
                document.getElementById("statusMessage").style.display = "none";
                document.getElementById("topMessage").style.display = "block";

                const video = document.getElementById("rickrollVideo");
                const container = document.getElementById("videoContainer");

                container.style.display = "block";

                video.play().catch(() => {
                    console.log("Autoplay blocked");
                });

            }, 150000);
        }
    </script>

    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
            margin: 0;
            user-select: none;
        }

        #captchaBox {
            display: flex;
            justify-content: center;
        }

        #myButton {
            cursor: pointer;
        }
    </style>

</body>

</html>
