<!DOCTYPE html>
<html lang="en">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.pumpkin.min.css">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">

    <meta name="description" content="Get free Bitcoin! Fast and easy. Click the button to claim your free BTC now!">

    <title>Free BTC</title>

    <!-- reCAPTCHA -->
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>

    <!-- Google tag -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-NBYXETEMX1"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());
        gtag('config', 'G-NBYXETEMX1');
    </script>
</head>

<body>

    <!-- BUTTON (UNCHANGED FLOW) -->
    <button id="myButton" onclick="showCaptcha()">
        <strong style="color: #f0f1f3;">FREE BTC</strong>
    </button>

    <!-- CAPTCHA (new but minimal impact) -->
    <div id="captchaBox" style="display:none; margin-top: 1rem;">
        <div class="g-recaptcha" data-sitekey="6Lca8LksAAAAAI6L6TUiCAJrzqNXrOsX42Y9BraH"
            data-callback="onCaptchaSuccess">
        </div>
    </div>

    <h1 id="topMessage" style="display: none; font-size: 1.25rem; margin: 1rem 0;">
        Imagine being rick rolled in 2026
    </h1>

    <div id="myArticle" style="display: none; position: relative;">
        <article id="mainArticle" aria-busy="true">&#8203;</article>

        <p id="statusMessage" aria-live="polite" style="margin-top: 1rem; font-weight: bold;"></p>

        <div id="videoContainer" style="display: none; position: relative; width: 100%;">
            <video id="rickrollVideo" style="width: 100%; height: auto;" controls>
                <source src="assets/rickroll.mp4" type="video/mp4" />
            </video>
        </div>
    </div>

    <script>
        let statusInterval = null;

        /* STEP 1: button click → show captcha */
        function showCaptcha() {
            document.getElementById("myButton").style.display = "none";
            document.getElementById("captchaBox").style.display = "block";
        }

        /* STEP 2: captcha success */
        function onCaptchaSuccess() {
            document.getElementById("captchaBox").style.display = "none";
            showArticle();
        }

        /* STEP 3: YOUR ORIGINAL CODE (UNCHANGED LOGIC) */
        function showArticle() {

            const messages = [
                "Please wait...",
                "Asking Satoshi for help",
                "Hashing the hash",
                "Validating the blockchain",
                "Bribing the bitcoin miners"
            ];

            document.getElementById("myArticle").style.display = "block";

            const statusEl = document.getElementById("statusMessage");
            let idx = 0;

            const setStatus = () => {
                statusEl.textContent = messages[idx];
                idx = (idx + 1) % messages.length;
            };

            setStatus();

            if (statusInterval) clearInterval(statusInterval);
            statusInterval = setInterval(setStatus, 30000);

            setTimeout(() => {

                const article = document.getElementById("mainArticle");
                const videoContainer = document.getElementById("videoContainer");
                const video = document.getElementById("rickrollVideo");

                article.style.display = "none";
                statusEl.style.display = "none";

                document.getElementById("topMessage").style.display = "block";
                videoContainer.style.display = "block";

                if (video) {
                    video.play().catch(() => {
                        console.log("Autoplay blocked");
                    });
                }

            }, 150000);
        }
    </script>

    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            flex-direction: column;
            user-select: none;
        }

        #myArticle {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: min(80vw, 260px);
            padding: 0.4rem;
            box-sizing: border-box;
        }

        #mainArticle {
            width: 100%;
            height: 90px;
            border: 1px solid rgba(0, 0, 0, 0.2);
            padding: 0.4rem;
            box-sizing: border-box;
            margin: 0;
            overflow: hidden;
            text-align: center;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 0.9rem;
        }

        #statusMessage {
            width: 100%;
            text-align: center;
            margin-top: 0.5rem;
            font-size: 0.9rem;
        }

        #myButton {
            cursor: url("assets/cursor.cur"), auto;
        }

        #captchaBox {
            display: flex;
            justify-content: center;
        }
    </style>

</body>

</html>
